spring.application.name=smartqueue
spring.profiles.active=${APP_PROFILE:local}

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL:URL}
spring.datasource.username=${DB_USERNAME:USERNAME}
spring.datasource.password=${DB_PASSWORD:PASSWORD}

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# ===============================
# FLYWAY CONFIGURATION
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8080}

# ===============================
# OTP EMAIL CONFIGURATION
# ===============================
app.otp.delivery.enabled=false
app.otp.allow-fallback-local=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@example.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.otp.mail.from=your_email@example.com
