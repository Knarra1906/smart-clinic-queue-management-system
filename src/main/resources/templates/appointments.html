<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-4 py-lg-5">
    <div class="glass-card p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 mb-0">Appointment Management</h1>
            <a class="btn btn-outline-secondary" href="/admin/dashboard">Back to Admin Dashboard</a>
        </div>
        <div class="alert alert-danger mb-3" th:if="${param.error}" th:text="${param.error}"></div>
        <div class="alert alert-success mb-3" th:if="${param.success}" th:text="${param.success}"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Token</th>
                    <th>Patient</th>
                    <th>Issue</th>
                    <th>Doctor</th>
                    <th>Emergency</th>
                    <th>Fee Status</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="8" class="text-center text-muted">No appointments found.</td>
                </tr>
                <tr th:each="appointment : ${appointments}">
                    <td class="fw-semibold" th:text="${appointment.tokenNumber}"></td>
                    <td th:text="${appointment.patient != null ? appointment.patient.name : 'N/A'}"></td>
                    <td th:text="${appointment.issue}"></td>
                    <td th:text="${appointment.doctor != null ? appointment.doctor.name : 'Not Assigned'}"></td>
                    <td>
                        <span th:if="${appointment.emergencyVerified}" class="badge text-bg-danger">VERIFIED</span>
                        <span th:if="${!appointment.emergencyVerified && appointment.emergencyRequested}" class="badge text-bg-warning">REQUESTED</span>
                        <span th:if="${!appointment.emergencyVerified && appointment.emergencyRequested}" class="badge text-bg-danger ms-1">ALERT</span>
                        <span th:if="${!appointment.emergencyVerified && !appointment.emergencyRequested}" class="badge text-bg-secondary">NO</span>
                        <div class="small text-muted mt-1" th:if="${appointment.emergencyRequested}"
                             th:text="${appointment.emergencyLevel + ' - ' + appointment.emergencyDescription}"></div>
                    </td>
                    <td>
                        <span th:text="'Rs. ' + ${appointment.consultationFee}"></span>
                        <span class="badge text-bg-success" th:if="${appointment.paid}">PAID</span>
                    </td>
                    <td th:text="${appointment.status}"></td>
                    <td class="d-flex gap-2 flex-wrap">
                        <form th:if="${appointment.status == T(com.clinic.smartqueue.model.AppointmentStatus).WAITING}" action="/appointments/assign" method="post" class="d-flex gap-2">
                            <input type="hidden" name="appointmentId" th:value="${appointment.id}">
                            <select class="form-select form-select-sm" name="doctorId" required>
                                <option value="" selected disabled>Assign doctor</option>
                                <option th:each="doctor : ${doctors}" th:value="${doctor.id}" th:text="${doctor.name + ' - ' + doctor.specialization}"></option>
                            </select>
                            <button class="btn btn-sm btn-primary" type="submit">Assign</button>
                        </form>
                        <form th:if="${appointment.status != T(com.clinic.smartqueue.model.AppointmentStatus).COMPLETED}" action="/appointments/cancel" method="post">
                            <input type="hidden" name="appointmentId" th:value="${appointment.id}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
