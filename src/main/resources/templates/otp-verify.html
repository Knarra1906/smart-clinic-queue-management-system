<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OTP Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="glass-card p-4 p-md-5">
                <h2 class="h3 mb-4 text-center">OTP Verification</h2>
                <p class="text-secondary">Enter the 6-digit OTP sent to your registered email.</p>
                <div class="alert alert-info py-2" th:if="${otpHint}">
                    Demo OTP: <strong th:text="${otpHint}"></strong>
                </div>
                <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>
                <div class="alert alert-success py-2" th:if="${success}" th:text="${success}"></div>

                <form action="/auth/verify-otp" method="post" class="d-grid gap-3">
                    <input class="form-control form-control-lg" type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
                    <button class="btn btn-primary btn-lg" type="submit">Verify OTP</button>
                </form>
                <form action="/auth/resend-otp" method="post" class="mt-3">
                    <button class="btn btn-outline-secondary w-100" type="submit">Resend OTP</button>
                </form>

                <div class="mt-4">
                    <a href="/login-page">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
