<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-4 py-lg-5">
    <div class="glass-card p-4 p-lg-5">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="h3 mb-1">Doctor Dashboard</h1>
                <p class="mb-0 text-secondary">Welcome, <strong th:text="${session.doctorName}"></strong></p>
            </div>
            <a class="btn btn-outline-danger" href="/doctor/logout">Logout</a>
        </div>
        <div class="alert alert-danger py-2" th:if="${param.error}" th:text="${param.error}"></div>
        <div class="alert alert-success py-2" th:if="${param.success}" th:text="${param.success}"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Token</th>
                    <th>Patient</th>
                    <th>Issue</th>
                    <th>Emergency</th>
                    <th>Fee</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="7" class="text-center text-muted">No appointments assigned.</td>
                </tr>
                <tr th:each="appointment : ${appointments}">
                    <td class="fw-semibold" th:text="'T-' + ${appointment.tokenNumber}"></td>
                    <td th:text="${appointment.patient != null ? appointment.patient.name : 'N/A'}"></td>
                    <td th:text="${appointment.issue}"></td>
                    <td>
                        <span th:if="${appointment.emergencyVerified}" class="badge text-bg-danger">VERIFIED</span>
                        <span th:if="${!appointment.emergencyVerified && appointment.emergencyRequested}" class="badge text-bg-warning">REQUESTED</span>
                        <span th:if="${!appointment.emergencyVerified && appointment.emergencyRequested}" class="badge text-bg-danger ms-1">ALERT</span>
                        <span th:if="${!appointment.emergencyVerified && !appointment.emergencyRequested}" class="badge text-bg-secondary">NO</span>
                        <div class="small text-muted mt-1" th:if="${appointment.emergencyRequested}"
                             th:text="${appointment.emergencyLevel + ' - ' + appointment.emergencyDescription}"></div>
                    </td>
                    <td>
                        <span th:text="'Rs. ' + ${appointment.consultationFee}"></span>
                        <span class="badge text-bg-success" th:if="${appointment.paid}">PAID</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${appointment.status == 'ASSIGNED'} ? ' text-bg-info' :
                                             (${appointment.status == 'CONSULTING'} ? ' text-bg-primary' :
                                             (${appointment.status == 'COMPLETED'} ? ' text-bg-success' :
                                             (${appointment.status == 'CANCELLED'} ? ' text-bg-danger' : ' text-bg-secondary')))"
                              th:text="${appointment.status}">
                        </span>
                    </td>
                    <td class="d-flex gap-2">
                        <form th:if="${appointment.emergencyRequested && !appointment.emergencyVerified}" method="post"
                              th:action="@{'/doctor/verify-emergency/' + ${appointment.id}}">
                            <button class="btn btn-sm btn-warning" type="submit">Verify Emergency</button>
                        </form>
                        <form th:if="${appointment.status == T(com.clinic.smartqueue.model.AppointmentStatus).ASSIGNED || appointment.status == T(com.clinic.smartqueue.model.AppointmentStatus).CONSULTING}"
                              method="post" th:action="@{'/doctor/status/' + ${appointment.id}}" class="d-flex gap-2 doctor-status-form">
                            <select class="form-select form-select-sm doctor-status-select" name="status" required>
                                <option value="" selected disabled>Update status</option>
                                <option th:if="${appointment.status == T(com.clinic.smartqueue.model.AppointmentStatus).ASSIGNED}" value="CONSULTING">Consulting</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                            <input class="form-control form-control-sm diagnosis-input" type="text" name="diagnosis" placeholder="Diagnosis">
                            <input class="form-control form-control-sm prescription-input" type="text" name="prescription" placeholder="Prescription">
                            <button class="btn btn-sm btn-success" type="submit">Update</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script>
    document.querySelectorAll('.doctor-status-form').forEach((form) => {
        const statusSelect = form.querySelector('.doctor-status-select');
        const diagnosis = form.querySelector('.diagnosis-input');
        const prescription = form.querySelector('.prescription-input');

        function togglePrescriptionRequired() {
            const isCompleted = statusSelect && statusSelect.value === 'COMPLETED';
            if (diagnosis) diagnosis.required = isCompleted;
            if (prescription) prescription.required = isCompleted;
        }

        if (statusSelect) {
            statusSelect.addEventListener('change', togglePrescriptionRequired);
            togglePrescriptionRequired();
        }
    });
</script>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
