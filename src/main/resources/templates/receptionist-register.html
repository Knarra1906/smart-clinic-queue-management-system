<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receptionist Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6">
            <div class="glass-card p-4 p-md-5">
                <h2 class="h3 mb-4 text-center">Create Receptionist Account</h2>

                <form action="/receptionist/register" method="post" class="row g-3">
                    <div class="col-12 col-md-3">
                        <label class="form-label">Title</label>
                        <select class="form-select" name="title" required>
                            <option value="" selected disabled>Select</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Mrs.">Mrs.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Dr.">Dr.</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-9">
                        <label class="form-label">Name</label>
                        <input class="form-control" type="text" name="name" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Phone</label>
                        <input class="form-control" type="text" name="phone" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" minlength="6" required>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-warning w-100" type="submit">Register</button>
                    </div>
                </form>

                <div class="alert alert-danger mt-3 mb-0 py-2" th:if="${error}" th:text="${error}"></div>
                <div class="d-flex justify-content-between mt-4">
                    <a href="/">Home</a>
                    <a href="/receptionist/login-page">Sign in</a>
                </div>
            </div>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
