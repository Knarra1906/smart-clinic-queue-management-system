<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-4 py-lg-5">
    <div class="glass-card p-4 p-lg-5">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="h3 mb-1">Dashboard</h1>
                <p class="mb-0 text-secondary">
                    Welcome, <strong th:text="${session.patientName}"></strong>
                    <span class="badge text-bg-light ms-2" th:text="${session.role}"></span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary" href="/appointments-page">Queue</a>
                <a class="btn btn-outline-success" th:if="${session.role == 'PATIENT'}" href="/history-page">Past History</a>
                <a class="btn btn-outline-dark" th:if="${session.role == 'ADMIN'}" href="/appointments/all">Admin Queue</a>
                <a class="btn btn-outline-danger" th:if="${session.role == 'ADMIN'}" href="/admin/logout">Logout</a>
                <a class="btn btn-outline-danger" th:if="${session.role == 'PATIENT'}" href="/auth/logout">Logout</a>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-4">
                <div class="metric-card p-3 h-100">
                    <p class="mb-2 text-secondary">Total Tokens</p>
                    <h2 class="display-6 mb-0" th:text="${totalAppointments}"></h2>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="metric-card warning p-3 h-100">
                    <p class="mb-2 text-secondary">Waiting</p>
                    <h2 class="display-6 mb-0" th:text="${waitingCount}"></h2>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="metric-card success p-3 h-100">
                    <p class="mb-2 text-secondary">Served</p>
                    <h2 class="display-6 mb-0" th:text="${servedCount}"></h2>
                </div>
            </div>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
