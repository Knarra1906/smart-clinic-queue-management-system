<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6">
            <div class="glass-card p-4 p-md-5">
                <h2 class="h3 mb-4 text-center">Admin Registration</h2>

                <form action="/admin/register" method="post" class="d-grid gap-3">
                    <select class="form-select form-select-lg" name="title" required>
                        <option value="" selected disabled>Select title</option>
                        <option value="Mr.">Mr.</option>
                        <option value="Mrs.">Mrs.</option>
                        <option value="Ms.">Ms.</option>
                        <option value="Dr.">Dr.</option>
                    </select>
                    <input class="form-control form-control-lg" type="text" name="name" placeholder="Full name"
                           pattern="^[A-Za-z][A-Za-z\\s]{1,99}$" minlength="2" maxlength="100" required>
                    <input class="form-control form-control-lg" type="email" name="email" placeholder="Email" required>
                    <input class="form-control form-control-lg" type="password" name="password" placeholder="Password"
                           minlength="6" required>
                    <input class="form-control form-control-lg" type="tel" name="phone" placeholder="Phone (10 digits)"
                           pattern="^[0-9]{10}$" inputmode="numeric" maxlength="10" required>
                    <button class="btn btn-dark btn-lg" type="submit">Create Account</button>
                </form>

                <div class="alert alert-danger mt-3 mb-0 py-2" th:if="${error}" th:text="${error}"></div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/">Home</a>
                    <a href="/admin/login-page">Already have account?</a>
                </div>
            </div>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
