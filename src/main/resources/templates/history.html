<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patient History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-4 py-lg-5">
    <div class="glass-card p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 mb-0">Past Consultation History</h1>
            <a class="btn btn-outline-secondary" href="/dashboard">Back to Dashboard</a>
        </div>

        <p class="text-secondary mb-3">Average waiting time in clinic: <strong th:text="${#numbers.formatDecimal(avgWaitMinutes, 1, 1)} + ' mins'"></strong></p>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Date</th>
                    <th>Doctor</th>
                    <th>Issue</th>
                    <th>Diagnosis</th>
                    <th>Prescription</th>
                    <th>Download</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(history)}">
                    <td colspan="6" class="text-center text-muted">No consultation history yet.</td>
                </tr>
                <tr th:each="item : ${history}">
                    <td th:text="${item.completedAt != null ? #temporals.format(item.completedAt, 'dd-MMM-yyyy HH:mm') : '-'}"></td>
                    <td th:text="${item.doctor != null ? item.doctor.name : 'N/A'}"></td>
                    <td th:text="${item.issue}"></td>
                    <td th:text="${item.diagnosis != null ? item.diagnosis : '-'}"></td>
                    <td th:text="${item.prescription != null ? item.prescription : '-'}"></td>
                    <td>
                        <a class="btn btn-sm btn-outline-primary"
                           th:if="${item.prescription != null && item.completedAt != null && T(java.time.Duration).between(item.completedAt, T(java.time.LocalDateTime).now()).toDays() <= 30}"
                           th:href="@{/appointments/prescription/download(appointmentId=${item.id})}">
                            PDF
                        </a>
                        <span class="text-muted small"
                              th:if="${item.prescription == null || item.completedAt == null || T(java.time.Duration).between(item.completedAt, T(java.time.LocalDateTime).now()).toDays() > 30}">
                            Expired/NA
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
