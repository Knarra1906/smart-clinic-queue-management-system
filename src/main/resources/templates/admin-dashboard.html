<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<main class="container py-4 py-lg-5">
    <div class="glass-card p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">Admin Dashboard</h1>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary" href="/appointments/all">Manage Appointments</a>
                <a class="btn btn-outline-danger" href="/admin/logout">Logout</a>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-2"><div class="metric-card p-3"><small>Total Patients</small><h4 th:text="${totalPatients}"></h4></div></div>
            <div class="col-6 col-lg-2"><div class="metric-card p-3"><small>Total Doctors</small><h4 th:text="${totalDoctors}"></h4></div></div>
            <div class="col-6 col-lg-2"><div class="metric-card p-3"><small>Total Appointments</small><h4 th:text="${totalAppointments}"></h4></div></div>
            <div class="col-6 col-lg-2"><div class="metric-card warning p-3"><small>Waiting</small><h4 th:text="${waitingCount}"></h4></div></div>
            <div class="col-6 col-lg-2"><div class="metric-card p-3"><small>Assigned</small><h4 th:text="${assignedCount}"></h4></div></div>
            <div class="col-6 col-lg-2"><div class="metric-card success p-3"><small>Completed</small><h4 th:text="${completedCount}"></h4></div></div>
        </div>

        <h2 class="h5 mb-3">Pending Doctor Approvals</h2>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Specialization</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(pendingDoctors)}">
                    <td colspan="4" class="text-center text-muted">No pending doctors.</td>
                </tr>
                <tr th:each="doc : ${pendingDoctors}">
                    <td th:text="${doc.name}"></td>
                    <td th:text="${doc.email}"></td>
                    <td th:text="${doc.specialization}"></td>
                    <td>
                        <form action="/admin/approve-doctor" method="post">
                            <input type="hidden" name="doctorId" th:value="${doc.id}">
                            <button class="btn btn-sm btn-success" type="submit">Approve</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
    <script th:src="@{/js/theme.js}"></script>
</body>
</html>
